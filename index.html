<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abastecimento</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }

        input, select {
            width: 100%;
            margin-top: 10px;
            padding: 5px;
        }

        #resultado {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Abastecimento</h1>
    <hr>

    <p>Escolha o tipo de combustível</p>
    <ul>
        <li>Gasolina: R$ 6,69</li>
        <li>Etanol: R$ 5,80</li>
        <li>Diesel: R$ 6,20</li>
    </ul>

    <form id="formCombustivel">
        <label>Tipo de Combustível</label>
        <select id="combustivel">
            <option value="">Selecione o combustível</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
        </select>

        <label>Quantidade (litros):</label>
        <input type="number" id="litros" step="0.1" min="0">
    </form>

    <h2>Resultado</h2>
    <p id="resultado">R$ 0,00</p>

    <script src="script.js"></script>
</body>
</html>
